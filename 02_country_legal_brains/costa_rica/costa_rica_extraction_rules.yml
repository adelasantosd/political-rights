# Costa Rica Extraction Rules — Political Rights
# NormTrace Political Rights
# Generated: 2026-05-18

country: "Costa Rica"

article_detection_patterns:
  description: >
    Costa Rican corpus uses at least 5 distinct heading formats for articles.
    All patterns are case-insensitive. Patterns listed in priority order.

  pattern_A:
    description: "Markdown heading + ARTÍCULO/Artículo + number + dash (CPEUM-style)"
    regex: "^#{1,6}\\s+ART[IÍ]CULO\\s+(\\d+[°o]?\\.?(?:\\s+bis)?)\\.?\\s*[-–]?\\s*(.*)"
    examples: ["### Artículo 93.- El sufragio...", "##### ARTÍCULO 1.- Principios..."]
    sources: [constitucion_politica_costa_rica, codigo_electoral_costa_rica, procesos_referendum, ley_organica_tse_registro_civil, reglamento_autonomo_servicios_tse, reglamento_asamblea_legislativa_comentado]

  pattern_B:
    description: "Markdown heading + Artículo + number + period + title (no dash)"
    regex: "^#{1,6}\\s+Art[ií]culo\\s+(\\d+[°o]?\\.?(?:\\s*bis|\\.?bis)?)\\.?\\s+(.*)"
    examples: ["### Artículo 1. Deberes y atribuciones de los diputados"]
    sources: [reglamento_asamblea_legislativa_comentado]

  pattern_C:
    description: "## ARTÍCULO N.- (two-hash, uppercase, dash)"
    regex: "^#{1,3}\\s+ARTÍCULO\\s+(\\d+[°o]?)\\.?\\s*[-–]?\\s*(.*)"
    examples: ["## ARTÍCULO 1.- Iniciativa"]
    sources: [ley_iniciativa_popular, ley_regulacion_referendum, ley_consulta_previa_facultativa_referendum]

  pattern_D:
    description: "Bold ARTICULO (no heading marker) — Ley Jurisdicción Constitucional"
    regex: "^\\*\\*ART[IÍ]CULO\\s+(\\d+\\.?)\\s*[-–]?\\*\\*\\s*(.*)"
    examples: ["**ARTICULO 1.-** La presente ley..."]
    sources: [ley_jurisdiccion_constitucional]

  pattern_E:
    description: "Bare Artículo N. (no heading marker) — some TSE documents"
    regex: "^Art[ií]culo\\s+(\\d+[°o]?\\.?(?:\\s*bis)?)\\.?\\s*[-–]?\\s*(.*)"
    examples: ["Artículo 5.- Para el cumplimiento..."]
    sources: [fallback]

  transitory_patterns:
    - "ART[IÍ]CULO\\s+(PRIMERO|SEGUNDO|TERCERO|CUARTO|QUINTO)\\s*[-–]?"
    - "Transitorio"
    - "TRANSITORIO"
    - "Disposici[oó]n\\s+transitoria"

excluded_sources:
  - ley_general_administracion_publica.md  # image-based — skip entirely

commented_source_handling:
  source: reglamento_asamblea_legislativa_comentado.md
  rule: >
    Extract article headers and immediately following paragraph text ONLY.
    Exclude: lines beginning with "Votos Sala Constitucional", resolution identifiers
    (e.g., "1990-00392"), bibliographic references, page markers ("<!-- Page N -->"),
    column references, and editorial annotations. Set manual_review_required: true
    for ALL provisions from this source. Do not extract Sala IV resolution text
    as operative law.
  patterns_to_exclude_from_text:
    - "Votos Sala Constitucional"
    - "\\d{4}-\\d{4,5}"  # resolution numbers like 1990-00392
    - "Acta de la Sesi[oó]n Plenaria"
    - "RAL 20\\d{2}"
    - "ISBN:"
    - "CEDIL"
    - "<!-- Page \\d+ -->"
    - "^[ivxlcdm]+\\s+[ivxlcdm]+"  # Roman numerals used as page headers

editorial_annotation_exclusion:
  description: >
    Exclude reform and editorial annotations from operative provision text.
  patterns_to_exclude:
    - "\\(Reforma Constitucional\\s+\\d+[^)]*\\)"
    - "\\(Reforma\\s+[^)]+\\)"
    - "\\(Adicionado[^)]+\\)"
    - "\\[Extraction note[^\\]]*\\]"
    - "<!-- Page \\d+ -->"
    - "\\(ver art[ií]culo[^)]*\\)"
  strip_inline: true

