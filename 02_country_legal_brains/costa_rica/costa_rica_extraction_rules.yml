      - r"c[eé]dula.*identidad"
      - r"elecciones? populares?"
      - r"sufragio universal"
      - r"sufragio secreto"
      - r"sufragio directo"
      - r"jornada electoral"
      - r"escrutinio"
      - r"registro civil.*elector"
