treaty_reception:
  model: >
    Dualist with supra-legal treaty status. Art. 7 CPCR: duly approved international
    treaties have authority superior to ordinary laws. Art. 48 CPCR (as reformed):
    rights from international instruments can be invoked via amparo before Sala
    Constitucional. Human rights treaties have constitutional or supra-constitutional
    protection in Sala IV jurisprudence.
  notes: >
    ICCPR Art. 25, ACHR Art. 23, and other political rights treaties are not
    available as text files in the current corpus. Conventionality analysis requires
    manual review.

