critical_institutional_distinction:
  note: >
    The Tribunal Supremo de Elecciones (TSE) in Costa Rica is NOT equivalent to
    Mexico's Instituto Nacional Electoral (INE). The TSE has constitutional rank
    equivalent to the three Branches of Government (Art. 9 CPCR), exercises
    EXCLUSIVE and non-reviewable jurisdiction over all electoral acts (Arts. 99–103),
    and its decisions cannot be appealed except by prevaricato (Art. 103).
    The TSE also issues binding reglamentos and interprets electoral law exclusively
    and obligatorily (Art. 102 Fr. 3). This dual administrative-jurisdictional role
    is constitutionally grounded, not merely administrative.

federal_structure:
  type: unitary
  levels:
    - National (República)
    - Provinces (7)
    - Cantons and Districts (municipalities)
  notes: >
    Costa Rica is a unitary state. Electoral law is governed at the national level
    by the TSE and the Asamblea Legislativa. Sub-national electoral dimensions
    (municipal elections) fall under the same national framework.

electoral_system_overview:
  suffrage: Universal, direct, secret, obligatory (Art. 93 CPCR)
  voting_age: 18
  citizenship_basis: Arts. 90–92 CPCR
  electoral_authority_primary: "Tribunal Supremo de Elecciones (TSE)"
  secondary_electoral_bodies: "Registro Civil (under TSE), Juntas Electorales"
  constitutional_court: "Sala Constitucional de la Corte Suprema de Justicia (Sala IV)"
