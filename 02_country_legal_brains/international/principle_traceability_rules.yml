# Principle Traceability Rules — International Standards Layer
# NormTrace Political Rights
# Generated: 2026-05-18

purpose: >
  Deterministic rules for the principle traceability pipeline. Defines how
  domestic provisions are evaluated against each of the 12 legal preparedness
  principles, how implementation_readiness_score is computed, and how
  mechanism-principle requirement rows are constructed. All logic is
  deterministic at runtime — no LLM inference. Scoring is diagnostic only.

---

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 1: SCORING RUBRIC
# ─────────────────────────────────────────────────────────────────────────────

scoring_rubric:
  description: >
    implementation_readiness_score (0–5) measures how operationally prepared
    domestic law is to satisfy the principle requirement, based on the
    provisions found in the domestic corpus. NOT a compliance finding.
    NOT a judicial determination. Diagnostic legal preparedness only.

  levels:
    - score: 0
      label: absent
      condition: >
        No domestic provision in the corpus addresses this principle-mechanism
        combination. Zero matched provisions, OR all matched provisions are
        derogated/blank. Mechanism may simply be absent from domestic law.

    - score: 1
      label: declaratory_only
      condition: >
        One or more provisions exist but are purely declaratory: no process
        defined, no actor assigned, no timeline, no remedy. Typically
        constitutional declarations without implementing legislation.
        Anchor strength ≤ 1 for all matched provisions.

    - score: 2
      label: partial_basis
      condition: >
        Legal basis exists (anchor_strength ≥ 2) but the provision is
        operationally incomplete: process OR actor present but not both;
        no timeline or remedy. May include only a regulatory-level reference
        with no statutory enabling provision.

    - score: 3
      label: functional_basis
      condition: >
        Legal basis with both actor AND process present in at least one
        matched provision. Missing at least one of: timeline, accessibility
        safeguard, equality measure, effective remedy, or territorial
        specification where required by the principle.

    - score: 4
      label: strong_basis
      condition: >
        Legal basis, actor, process, AND at least one of: remedy/accountability
        mechanism, specific timeline/deadline, accessibility or equality
        safeguard. Operationally complete for primary use case but may lack
        cross-cutting safeguards (e.g., disability accessibility, indigenous
        languages) or territorial coverage.

    - score: 5
      label: integrated_basis
      condition: >
        Full operational integration: legal basis (constitutional or statutory),
        designated actor with competence, defined process, timeline or deadline,
        AND at least two of the following cross-cutting safeguards present:
        accessibility/disability accommodation, equality/parity measures,
        effective remedy, transparency/audit mechanism, territorial or
        multilevel coverage (indigenous or subnational). No significant
        structural gap identified.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 2: DIMENSION CHECKS
# Defines what each operational_dimension means in terms of
# detectable features in domestic provisions.
# ─────────────────────────────────────────────────────────────────────────────

dimension_checks:

  constitutional_or_statutory_anchor_exists:
    check: anchor_strength >= 4
    note: "Constitution or organic law — source_type in [constitution, organic_law, codigo_ley]"
    contributes_to_score: [3, 4, 5]

  provision_text_is_accessible_and_precise:
    check: provision_text_length >= 60
    note: "Proxy: substantive text longer than minimal declaration"
    contributes_to_score: [3, 4, 5]

  legal_hierarchy_consistent_and_non_contradictory:
    check: manual_review_required == false
    note: "Provisions not flagged for legal conflict or ambiguity"
    contributes_to_score: [4, 5]

  enabling_legislation_or_implementing_regulation_present:
    check: >
      source_type in [statutory, codigo_ley, organic_law, tse_reglamento,
      ine_reglamento, regulatory_or_legislative_procedural]
    note: "More than constitutional basis; has implementing instrument"
    contributes_to_score: [3, 4, 5]

  non_discrimination_clause_present:
    check: mechanism matches r"(sin discriminaci[oó]n|igualdad|igual[ií]|no discriminaci[oó]n|paridad)"
    note: "Explicit non-discrimination or equality in provision text"
    contributes_to_score: [3, 4, 5]

  parity_or_gender_equality_measure_present:
    check: mechanism matches r"(paridad|cuota|igualdad de g[eé]nero|50.50|medidas.*especiales)"
    contributes_to_score: [4, 5]

  ethnic_or_indigenous_inclusion_provision_present:
    check: mechanism matches r"(ind[íi]gena|pueblo.*originario|comunidad.*ind[íi]gena|consulta previa)"
    contributes_to_score: [4, 5]

  disability_or_accessibility_measure_present:
    check: mechanism matches r"(discapacidad|accesib|ajuste razonable|asistencia.*voto|voto.*asistido)"
    contributes_to_score: [4, 5]

  process_defined:
    check: mechanism in PROCESS_MECHANISM_TYPES
    note: >
      PROCESS_MECHANISM_TYPES: mechanisms that define a procedural sequence
      (e.g., vote, recall, citizen_initiative, popular_consultation, referendum,
      electoral_remedies, constitutional_remedies)
    contributes_to_score: [3, 4, 5]

  actor_assigned:
    check: actor_id is not null in matched provision
    note: "At least one actor assigned in actor_mechanism_edges for this mechanism"
    contributes_to_score: [3, 4, 5]

  timeline_or_deadline_present:
    check: mechanism matches r"(plazo|t[eé]rmino|d[ií]as|horas|dentro de|a m[aá]s tardar|calendario|peri[oó]dico)"
    contributes_to_score: [4, 5]

  remedy_or_accountability_mechanism_present:
    check: mechanism in [electoral_remedies, constitutional_remedies]
    note: "Or: provision text matches r'(recurso|impugnar|inconformidad|nulidad|sanci[oó]n|juicio)'"
    contributes_to_score: [4, 5]

  territorial_or_multilevel_coverage:
    check: mechanism matches r"(municipal|local|territorial|nivel.*federal|estado.*municipio|comunidad.*ind[íi]gena|circunscripci[oó]n)"
    contributes_to_score: [4, 5]

  restriction_has_objective_criteria:
    check: mechanism matches r"(criterio.*objetivo|proporcion|necesario|fin leg[íi]timo|ley.*establece)"
    contributes_to_score: [3, 4, 5]

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 3: MECHANISM-TO-PRINCIPLE MAPPING
# For each principle, which mechanisms are expected to evidence it.
# Used to build the mechanism_principle_requirements table.
# ─────────────────────────────────────────────────────────────────────────────

