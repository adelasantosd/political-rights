    relevant_sources:
      - MEX-CPEUM
      - MEX-LGIPE
      - MEX-LGPP
      - MEX-LFCP
      - MEX-LFRM
    mechanisms:
      - vote
      - right_to_stand_for_election
      - citizen_initiative
      - popular_consultation
      - recall
      - legislative_petition_or_participation
    functions:
      - "Exercise active and passive suffrage"
      - "Submit citizen legislative initiatives"
      - "Request and vote in consultas populares"
      - "Request and vote in revocación de mandato"
      - "Register as independent candidates"
    legal_preparedness_role: primary_rights_holder
    manual_review_required: false
    notes: "Citizens are the primary rights holders. Citizenship defined at Art. 34 CPEUM (age 18+, Mexican nationality)."

