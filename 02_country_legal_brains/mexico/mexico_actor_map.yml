# Mexico Actor Map — Political Rights
# NormTrace Political Rights
# Generated: 2026-05-18
# Status: preliminary — requires expert legal validation

country: Mexico

actors:

  - actor_id: MEX-ACT-001
    actor_name: "Instituto Nacional Electoral (INE)"
    actor_type: autonomous_electoral_authority
    constitutional_or_statutory_basis:
      - "CPEUM Art. 41 (autonomous constitutional authority, Consejo General)"
      - "LGIPE (statutory development of INE mandate)"
    relevant_sources:
      - MEX-CPEUM
      - MEX-LGIPE
      - MEX-LGPP
      - MEX-REGINE
      - MEX-INECP
      - MEX-INERM
    mechanisms:
      - vote
      - right_to_stand_for_election
      - political_parties
      - independent_candidacies
      - citizen_initiative
      - popular_consultation
      - recall
      - electoral_authority_internal_governance
    functions:
      - "Organization and administration of federal elections"
      - "Voter registration (Padrón Electoral, Lista Nominal)"
      - "Candidate registration and verification"
      - "Party registration and oversight"
      - "Public financing distribution to parties"
      - "Media access (radio/TV) management for electoral campaigns"
      - "Organization of consultas populares and revocación de mandato"
      - "Citizen initiative signature verification"
      - "Proactive transparency (sujeto obligado under LGTAIP)"
    legal_preparedness_role: primary_electoral_administrator
    manual_review_required: false
    notes: "INE is the primary autonomous electoral authority in Mexico. Created by 2014 electoral reform."

  - actor_id: MEX-ACT-002
    actor_name: "Tribunal Electoral del Poder Judicial de la Federación (TEPJF)"
    actor_type: electoral_court
    constitutional_or_statutory_basis:
      - "CPEUM Art. 99 (maximum electoral jurisdiction)"
      - "LGSMIME (statutory development of TEPJF jurisdiction)"
    relevant_sources:
      - MEX-CPEUM
      - MEX-LGSMIME
      - MEX-LFCP
      - MEX-LFRM
    mechanisms:
      - electoral_remedies
      - popular_consultation
      - recall
    functions:
      - "Final and definitive resolution of electoral disputes"
      - "Juicio de revisión constitucional (JRC)"
      - "Juicio para la protección de derechos político-electorales del ciudadano (JDC)"
      - "Review of impugnations against INE resolutions"
      - "Final count in revocación de mandato"
      - "Impugnation route for consulta popular resolutions"
    legal_preparedness_role: supreme_electoral_tribunal
    manual_review_required: false
    notes: "TEPJF jurisprudence (tesis y criterios) not in corpus — interpretive anchor incomplete."

  - actor_id: MEX-ACT-003
    actor_name: "Suprema Corte de Justicia de la Nación (SCJN)"
    actor_type: supreme_court
    constitutional_or_statutory_basis:
      - "CPEUM Art. 105 Fr. II (acciones de inconstitucionalidad in electoral matters)"
      - "CPEUM Art. 35 Fr. VIII numeral 3o (constitutionality review of consulta popular subject matter)"
    relevant_sources:
      - MEX-CPEUM
      - MEX-LGIPE
      - MEX-LGSMIME
      - MEX-LFCP
    mechanisms:
      - popular_consultation
      - electoral_remedies
    functions:
      - "Constitutionality review of electoral laws (acciones de inconstitucionalidad)"
      - "Pre-consultation constitutionality review of consulta popular subject matter"
      - "Invalidation of unconstitutional electoral provisions"
    legal_preparedness_role: constitutional_review_court
    manual_review_required: false
    notes: >
      SCJN role in electoral matters is primarily constitutionality review.
      SCJN 2023 invalidation of the 2023 electoral reform has direct impact on
      LGIPE and LGSMIME provisions in corpus.

  - actor_id: MEX-ACT-004
    actor_name: "Congreso de la Unión — Cámara de Diputados"
    actor_type: legislative_body
    constitutional_or_statutory_basis:
      - "CPEUM Art. 50–70 (legislative power)"
      - "CPEUM Art. 35 Fr. VII (receives citizen initiatives)"
    relevant_sources:
      - MEX-CPEUM
      - MEX-REGCD
      - MEX-REGCONG
    mechanisms:
      - citizen_initiative
      - legislative_petition_or_participation
      - popular_consultation
    functions:
      - "Legislative function — enactment of electoral laws"
      - "Reception and processing of citizen legislative initiatives"
      - "Convocation of consultas populares (on petition)"
      - "Electoral budget approval"
    legal_preparedness_role: legislature
    manual_review_required: false
    notes: "Cámara de Diputados is the lower chamber; citizen initiatives must pass through both chambers."

  - actor_id: MEX-ACT-005
    actor_name: "Congreso de la Unión — Senado de la República"
    actor_type: legislative_body
    constitutional_or_statutory_basis:
      - "CPEUM Art. 50–58 (legislative power)"
    relevant_sources:
      - MEX-CPEUM
      - MEX-REGSN
      - MEX-REGCONG
    mechanisms:
      - citizen_initiative
      - legislative_petition_or_participation
      - popular_consultation
    functions:
      - "Legislative function — enactment of electoral laws"
      - "Processing of citizen legislative initiatives (joint procedure)"
      - "Convocation of consultas populares (on petition)"
    legal_preparedness_role: legislature
    manual_review_required: false
    notes: "Senado de la República is the upper chamber."

  - actor_id: MEX-ACT-006
    actor_name: "Partidos Políticos Nacionales"
    actor_type: political_organization
    constitutional_or_statutory_basis:
      - "CPEUM Art. 41 (constitutionally recognized; receive public financing)"
      - "LGPP (registration, rights, obligations, financing)"
    relevant_sources:
      - MEX-CPEUM
      - MEX-LGPP
      - MEX-LGIPE
    mechanisms:
      - political_parties
      - vote
      - right_to_stand_for_election
    functions:
      - "Election of candidates for popular election"
      - "Participation in election campaigns"
      - "Receive and administer public financing"
      - "Internal democracy and governance"
    legal_preparedness_role: political_actor
    manual_review_required: false
    notes: "Parties are constitutionally recognized entities with autonomous legal status under LGPP."

  - actor_id: MEX-ACT-007
    actor_name: "Ciudadanos / Ciudadanas (Citizens)"
    actor_type: rights_holder
    constitutional_or_statutory_basis:
