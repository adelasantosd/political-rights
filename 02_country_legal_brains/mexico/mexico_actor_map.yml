    legal_preparedness_role: electoral_crimes_prosecutor
    manual_review_required: false
    notes: "FGR has specialized unit for electoral crimes (FEPADE, or equivalent post-reform)."

  - actor_id: MEX-ACT-009
    actor_name: "Secretaría de Función Pública (SFP) / Órganos Internos de Control"
    actor_type: oversight_body
    constitutional_or_statutory_basis:
