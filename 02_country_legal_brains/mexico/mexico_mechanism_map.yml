      and political institutions. Includes proactive transparency, access to
      information requests, and party financial disclosure.
    legal_preparedness_relevance: secondary
    constitutional_sources:
      - "CPEUM Art. 6 (right to access information)"
    statutory_sources:
      - "Ley General de Transparencia y Acceso a la Información Pública (LGTAIP)"
      - "LGPP (party financial transparency and fiscalización)"
      - "LGRA (administrative responsibility — public servants in electoral bodies)"
    regulatory_or_procedural_sources: []
    administrative_sources:
      - "INE acuerdos on proactive transparency (Reglamento Interior INE 2025)"
    interpretive_sources: []
    core_legal_elements:
      - "Constitutional right to information (Art. 6 CPEUM)"
      - "LGTAIP: INE and TEPJF as sujetos obligados"
      - "LGPP: party financial reporting and audit by INE"
      - "LGRA: accountability for electoral officials"
    likely_legal_anchor_strength: 4
    operational_dependence: medium
    manual_review_required: false
    notes: "Well-anchored but secondary to core electoral mechanisms."

  - mechanism_id: MEX-MECH-012
